<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>GEOMETRY DASH - PRO EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');
        body { margin: 0; overflow: hidden; background: #00274c; font-family: 'Oswald', sans-serif; color: white; user-select: none; }
        
        .overlay { 
            position: absolute; inset: 0; display: none; 
            justify-content: center; align-items: center; 
            flex-direction: column; background: rgba(0,0,0,0.8); z-index: 100; 
        }
        .active { display: flex; }

        .btn {
            background: #2af598; border: 5px solid #fff; border-radius: 15px;
            padding: 20px 60px; font-size: 40px; cursor: pointer;
            box-shadow: 0 8px 0 #16a34a; color: black; font-weight: bold;
            text-transform: uppercase; margin: 10px;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #16a34a; }

        #hud {
            position: absolute; top: 20px; width: 100%; display: none;
            justify-content: center; font-size: 30px; z-index: 50; text-shadow: 2px 2px #000;
        }
        canvas { display: block; background: linear-gradient(180deg, #0052cc 0%, #000 100%); }
        
        .finish-text { font-size: 80px; color: #ffd700; text-shadow: 5px 5px #000; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="hud">PROGRESS: <span id="percent">0</span>%</div>

<div id="ui-start" class="overlay active">
    <h1 style="font-size: 80px; text-shadow: 5px 5px #000; margin-bottom: 30px;">GEOMETRY DASH</h1>
    <button class="btn" onclick="startGame()">▶ PLAY LEVEL</button>
</div>

<div id="ui-pause" class="overlay">
    <h1 style="font-size: 60px;">PAUSED</h1>
    <button class="btn" onclick="resumeGame()">RESUME</button>
    <button class="btn" style="background:#ff4444; border-color: #fff;" onclick="location.reload()">EXIT</button>
</div>

<div id="ui-finish" class="overlay">
    <h1 class="finish-text">LEVEL COMPLETE!</h1>
    <p style="font-size: 30px;">Ai terminat Stereo Madness!</p>
    <button class="btn" onclick="location.reload()">REPLAY</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let isPlaying = false, isPaused = false, camX = 0, groundY;
    const levelLength = 6000; // Lungimea totală a hărții

    // HARTA REALA (Stereo Madness) - [x, tip, inaltime]
    // tip 0 = spike, tip 1 = bloc
    const map = [
        [600,0], [900,0], [1200,1], [1240,1], [1280,1],
        [1600,0], [1645,0], // Double spike
        [2000,1,40], [2040,1,40], [2080,1,40],
        [2400,0], [2445,0], [2490,0], // TRIPLE SPIKE
        [2900,1], [3100,1,80], [3300,1,160], [3500,0], [3545,0],
        [4000,1], [4040,1], [4080,1], [4120,1], [4500,0], [4550,0],
        [5000,1,40], [5200,0], [5400,1,80], [5600,0], [5645,0]
    ];

    const player = {
        x: 200, y: 0, size: 40, dy: 0, grav: 0.98, jump: -16, rot: 0,
        update() {
            this.dy += this.grav;
            this.y += this.dy;
            if (this.y > groundY - this.size) {
                this.y = groundY - this.size;
                this.dy = 0;
                this.rot = Math.round(this.rot / 90) * 90;
            } else { this.rot += 8; }
        }
    };

    function startGame() {
        isPlaying = true;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        groundY = canvas.height - 150;
        player.y = groundY - 40;
        camX = 0;
        document.getElementById('ui-start').classList.remove('active');
        document.getElementById('hud').style.display = 'flex';
        loop();
    }

    function loop() {
        if (!isPlaying || isPaused) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Podeaua albastră cu grid
        ctx.fillStyle = "#001a33";
        ctx.fillRect(0, groundY, canvas.width, 150);
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        for(let i=0; i<canvas.width; i+=60) {
            ctx.strokeRect(i - (camX % 60), groundY, 60, 60);
        }

        camX += 9.5; // Viteza
        player.update();

        // Verifică Finish
        if (camX >= levelLength) {
            isPlaying = false;
            document.getElementById('ui-finish').classList.add('active');
            return;
        }

        // Obstacole
        map.forEach(obs => {
            let ox = obs[0] - camX + player.x;
            let oy = groundY - (obs[2] || 0);

            if (ox < -100 || ox > canvas.width) return;

            if (obs[1] === 0) { // SPIKE
                ctx.fillStyle = "#ff4d4d";
                ctx.beginPath();
                ctx.moveTo(ox, groundY); ctx.lineTo(ox+20, groundY-40); ctx.lineTo(ox+40, groundY);
                ctx.fill();
                if (player.x + 30 > ox && player.x + 10 < ox + 30 && player.y + 35 > groundY - 35) die();
            } else { // BLOC
                ctx.fillStyle = "#111";
                ctx.fillRect(ox, oy - 40, 40, 40);
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.strokeRect(ox, oy-40, 40, 40);
                if (player.x + 38 > ox && player.x < ox + 38) {
                    if (player.y + 40 > oy - 40 && player.y + 40 < oy - 20 && player.dy >= 0) {
                        player.y = oy - 80; player.dy = 0;
                    } else if (player.y + 35 > oy - 40) die();
                }
            }
        });

        // Player (Patratul galben)
        ctx.save();
        ctx.translate(player.x + 20, player.y + 20);
        ctx.rotate(player.rot * Math.PI / 180);
        ctx.fillStyle = "#facc15"; ctx.fillRect(-20, -20, 40, 40);
        ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.strokeRect(-20, -20, 40, 40);
        ctx.restore();

        let progress = Math.min(100, Math.floor((camX / levelLength) * 100));
        document.getElementById('percent').innerText = progress;
        
        requestAnimationFrame(loop);
    }

    function die() {
        isPlaying = false;
        setTimeout(startGame, 400); 
    }

    function resumeGame() {
        isPaused = false;
        document.getElementById('ui-pause').classList.remove('active');
        loop();
    }

    window.addEventListener('keydown', (e) => {
        if ((e.code === 'Space' || e.key === 'ArrowUp') && player.dy === 0) player.dy = player.jump;
        if (e.key === 'Escape' && isPlaying) {
            isPaused = !isPaused;
            document.getElementById('ui-pause').classList.toggle('active', isPaused);
            if (!isPaused) loop();
        }
    });

    canvas.addEventListener('mousedown', () => { if(player.dy === 0) player.dy = player.jump; });
</script>
</body>
</html>
