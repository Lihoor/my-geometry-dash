<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>GD ULTIMATE REPLICA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');
        body { margin: 0; overflow: hidden; background: #af00af; font-family: 'Oswald', sans-serif; color: white; }
        /* Fundalul Roz/Mov din poza ta */
        #bg { position: absolute; inset: 0; background: linear-gradient(180deg, #ff00ff 0%, #700070 100%); z-index: -1; }
        .overlay { position: absolute; inset: 0; display: none; justify-content: center; align-items: center; flex-direction: column; background: rgba(0,0,0,0.6); z-index: 100; }
        .active { display: flex; }
        .btn { background: #2af598; border: 4px solid #fff; padding: 15px 40px; font-size: 25px; cursor: pointer; margin: 10px; border-radius: 12px; color: #000; font-weight: bold; text-shadow: none; }
        canvas { display: block; }
        #stats { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 30px; pointer-events: none; }
    </style>
</head>
<body>

<div id="bg"></div>
<div id="stats" style="display:none">PROGRESS: <span id="p-val">0</span>%</div>

<div id="m-main" class="overlay active">
    <h1 style="font-size: 70px; text-shadow: 4px 4px #000;">GEOMETRY DASH</h1>
    <button class="btn" onclick="start()">PLAY</button>
</div>

<div id="m-pause" class="overlay">
    <h1 style="font-size: 50px;">PAUSED</h1>
    <button class="btn" onclick="resume()">RESUME</button>
    <button class="btn" style="background:#ff4444;" onclick="location.reload()">LOBBY</button>
</div>

<canvas id="gCanvas"></canvas>

<script>
    const canvas = document.getElementById('gCanvas');
    const ctx = canvas.getContext('2d');
    let running = false, paused = false, camX = 0, groundY;
    
    const player = { x: 200, y: 0, size: 40, dy: 0, grav: 0.9, jump: -15, rot: 0 };

    function start() {
        running = true;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        groundY = canvas.height - 120;
        player.y = groundY - 40;
        document.getElementById('m-main').classList.remove('active');
        document.getElementById('stats').style.display = 'block';
        loop();
    }

    function loop() {
        if(!running || paused) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Podeaua albastră ca în poze
        ctx.fillStyle = "#0066ff";
        ctx.fillRect(0, groundY, canvas.width, 120);
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
        ctx.strokeRect(-5, groundY, canvas.width + 10, 5);

        camX += 9;
        player.dy += player.grav;
        player.y += player.dy;

        if(player.y > groundY - player.size) {
            player.y = groundY - player.size; player.dy = 0;
            player.rot = Math.round(player.rot/90)*90;
        } else { player.rot += 8; }

        // Player (Cubul verde/galben)
        ctx.save();
        ctx.translate(player.x + 20, player.y + 20);
        ctx.rotate(player.rot * Math.PI / 180);
        ctx.fillStyle = "#aaff00"; ctx.fillRect(-20, -20, 40, 40);
        ctx.strokeStyle = "#fff"; ctx.strokeRect(-20, -20, 40, 40);
        ctx.restore();

        document.getElementById('p-val').innerText = Math.floor(camX / 50);
        requestAnimationFrame(loop);
    }

    function resume() { paused = false; document.getElementById('m-pause').classList.remove('active'); loop(); }

    window.addEventListener('keydown', (e) => {
        if(e.code === 'Space' && player.dy === 0) player.dy = player.jump;
        if(e.key === 'Escape') {
            paused = !paused;
            document.getElementById('m-pause').classList.toggle('active', paused);
            if(!paused) loop();
        }
    });
</script>
</body>
</html>
