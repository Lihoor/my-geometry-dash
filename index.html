<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; }
        #gameCanvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }
        #ui > * { pointer-events: auto; }
        #progressBar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 300px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; }
        #progressFill { height: 100%; background: linear-gradient(90deg, #00ff88, #00ffcc); width: 0%; box-shadow: 0 0 10px #00ff88; }
        #percentDisplay { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); color: white; font-size: 14px; }
        #attemptCounter { position: absolute; top: 20px; right: 30px; color: white; font-size: 18px; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 100; }
        #menu h1 { font-size: 72px; color: #fff; text-shadow: 0 0 30px #00ffcc; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        #menu p { color: rgba(255,255,255,0.7); font-size: 18px; margin-bottom: 40px; }
        .menuBtn { display: block; width: 250px; margin: 15px auto; padding: 18px 40px; font-size: 20px; font-weight: bold; color: white; background: linear-gradient(135deg, #00ff88, #00ccff); border: none; border-radius: 50px; cursor: pointer; text-transform: uppercase; }
        .menuBtn:hover { transform: scale(1.05); }
        #levelSelect { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 100; }
        #levelSelect h2 { color: white; font-size: 48px; margin-bottom: 40px; }
        .levelGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 600px; }
        .levelBtn { width: 150px; height: 150px; border: 3px solid rgba(255,255,255,0.3); border-radius: 20px; background: rgba(255,255,255,0.1); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .levelBtn:hover { transform: scale(1.1); border-color: #00ff88; background: rgba(255,255,255,0.2); }
        .levelBtn .levelNum { font-size: 48px; font-weight: bold; }
        .levelBtn .levelName { font-size: 12px; opacity: 0.7; margin-top: 5px; }
        .levelBtn .difficulty { display: flex; gap: 3px; margin-top: 10px; }
        .levelBtn .difficulty span { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .levelBtn .difficulty span.active { background: #ff6b6b; }
        #pauseMenu, #deathScreen, #winScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; justify-content: center; align-items: center; flex-direction: column; }
        #pauseMenu h2, #deathScreen h2, #winScreen h2 { color: white; font-size: 56px; margin-bottom: 20px; }
        #deathScreen h2 { color: #ff4444; }
        #winScreen h2 { color: #00ff88; }
        #deathScreen p, #winScreen p { color: rgba(255,255,255,0.7); font-size: 24px; margin-bottom: 40px; }
        .backBtn { position: absolute; top: 30px; left: 30px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; }
        .backBtn:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="progressBar"><div id="progressFill"></div></div>
            <div id="percentDisplay">0%</div>
            <div id="attemptCounter">Attempt 1</div>
        </div>
        <div id="menu">
            <h1>GEOMETRY DASH</h1>
            <p>Click or press SPACE to jump</p>
            <button class="menuBtn" onclick="showLevelSelect()">PLAY</button>
        </div>
        <div id="levelSelect">
            <button class="backBtn" onclick="showMenu()">Back</button>
            <h2>SELECT LEVEL</h2>
            <div class="levelGrid" id="levelGrid"></div>
        </div>
        <div id="pauseMenu">
            <h2>PAUSED</h2>
            <button class="menuBtn" onclick="resumeGame()">RESUME</button>
            <button class="menuBtn" onclick="restartLevel()">RESTART</button>
            <button class="menuBtn" onclick="exitToMenu()">EXIT</button>
        </div>
        <div id="deathScreen">
            <h2>CRASHED!</h2>
            <p id="deathPercent">Progress: 0%</p>
            <button class="menuBtn" onclick="restartLevel()">RETRY</button>
            <button class="menuBtn" onclick="exitToMenu()">EXIT</button>
        </div>
        <div id="winScreen">
            <h2>LEVEL COMPLETE!</h2>
            <p id="winStats">Attempts: 1 | Jumps: 0</p>
            <button class="menuBtn" onclick="nextLevel()">NEXT LEVEL</button>
            <button class="menuBtn" onclick="exitToMenu()">EXIT</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class AudioSystem {
            constructor() { this.audioContext = null; this.sfxEnabled = true; this.musicEnabled = true; }
            init() { this.audioContext = new (window.AudioContext || window.webkitAudioContext)(); }
            createOscillator(freq, type, duration, volume = 0.3) {
                if (!this.sfxEnabled || !this.audioContext) return;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                osc.connect(gain);
                gain.connect(this.audioContext.destination);
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(volume * 0.5, this.audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
                osc.start();
                osc.stop(this.audioContext.currentTime + duration);
            }
            playJump() { this.createOscillator(400, 'square', 0.1, 0.2); setTimeout(() => this.createOscillator(600, 'square', 0.1, 0.15), 50); }
            playDeath() { this.createOscillator(200, 'sawtooth', 0.3, 0.3); }
            playOrb() { this.createOscillator(800, 'sine', 0.15, 0.3); this.createOscillator(1200, 'sine', 0.1, 0.2); }
            playWin() { [523, 659, 784, 1047, 784, 1047].forEach((n, i) => { setTimeout(() => this.createOscillator(n, 'square', 0.4, 0.2), i * 100); }); }
            playClick() { this.createOscillator(1000, 'square', 0.05, 0.1); }
            
            startMusic() {
                if (!this.musicEnabled || !this.audioContext) return;
                const gain = this.audioContext.createGain();
                gain.connect(this.audioContext.destination);
                gain.gain.value = 0.1;
                let note = 0;
                const melody = [220, 220, 247, 262, 247, 220, 196, 220];
                const loop = () => {
                    if (gameState.isPlaying && this.musicEnabled && note < melody.length) {
                        const osc = this.audioContext.createOscillator();
                        osc.connect(gain);
                        osc.type = 'square';
                        osc.frequency.value = melody[note];
                        const g = this.audioContext.createGain();
                        g.connect(gain);
                        g.gain.setValueAtTime(0.08, this.audioContext.currentTime);
                        g.gain.linearRampToValueAtTime(0, this.audioContext.currentTime + 0.15);
                        osc.start();
                        osc.stop(this.audioContext.currentTime + 0.15);
                        note++;
                        setTimeout(loop, 150);
                    }
                };
                loop();
            }
        }

        const audio = new AudioSystem();
        const gameState = { currentScreen: 'menu', currentLevel: 0, attempt: 1, isPaused: false, isPlaying: false, stats: { totalJumps: 0 } };

        class Player {
            constructor() { this.reset(); }
            reset() {
                this.x = 150;
                this.y = canvas.height - 200;
                this.width = 50;
                this.height = 50;
                this.velocityY = 0;
                this.gravity = 0.8;
                this.jumpForce = -16;
                this.grounded = false;
                this.rotation = 0;
                this.dead = false;
                this.flipped = false;
                this.trail = [];
            }
            update(ground, ceiling) {
                if (this.dead) return;
                const g = this.flipped ? -1 : 1;
                this.velocityY += this.gravity * g;
                this.y += this.velocityY;
                if (!this.flipped && this.y + this.height >= ground) {
                    this.y = ground - this.height;
                    this.velocityY = 0;
                    this.grounded = true;
                } else if (this.flipped && this.y <= ceiling) {
                    this.y = ceiling;
                    this.velocityY = 0;
                    this.grounded = true;
                } else this.grounded = false;
                if (!this.grounded) this.rotation += 0.15 * (this.flipped ? -1 : 1);
                else this.rotation = Math.round(this.rotation / (Math.PI / 2)) * (Math.PI / 2);
                
                this.trail.push({ x: this.x, y: this.y + this.height / 2, alpha: 1 });
                if (this.trail.length > 12) this.trail.shift();
                this.trail.forEach(t => t.alpha -= 0.08);
            }
            jump() {
                if (this.dead || !this.grounded) return;
                this.velocityY = this.jumpForce * (this.flipped ? -1 : 1);
                this.grounded = false;
                audio.playJump();
                gameState.stats.totalJumps++;
            }
            die() {
                if (this.dead) return;
                this.dead = true;
                audio.playDeath();
                setTimeout(() => showDeathScreen(), 500);
            }
            draw() {
                ctx.save();
                this.trail.forEach((t, i) => {
                    if (t.alpha > 0) {
                        ctx.globalAlpha = t.alpha * 0.5;
                        ctx.fillStyle = '#00ff88';
                        ctx.beginPath();
                        ctx.arc(t.x - game.camera.x + 25, t.y, (i / 12) * 12, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                ctx.globalAlpha = 1;
                if (!this.dead) {
                    ctx.save();
                    ctx.translate(this.x - game.camera.x + 25, this.y + 25);
                    ctx.rotate(this.rotation);
                    const grad = ctx.createLinearGradient(-25, -25, 25, 25);
                    grad.addColorStop(0, '#00ff88');
                    grad.addColorStop(1, '#00ccff');
                    ctx.fillStyle = grad;
                    ctx.fillRect(-25, -25, 50, 50);
                    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(-25, -25, 50, 50);
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(-12, -12, 24, 24);
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(5, 0, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(7, 0, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
                ctx.restore();
            }
        }

        class Spike {
            constructor(x) { this.x = x; this.width = 70; this.height = 70; }
            draw(cameraX) {
                const gy = groundY;
                const sx = this.x - cameraX;
                if (sx < -100 || sx > canvas.width + 100) return;
                ctx.save();
                ctx.translate(sx + 35, gy - 50 + 35);
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(0, -35);
                ctx.lineTo(35, 35);
                ctx.lineTo(-35, 35);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = 'rgba(200,200,200,0.8)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
            }
            checkCollision(player) {
                const gy = groundY;
                const px = player.x + 10;
                const ppy = player.y + 10;
                const pw = player.width - 20;
                const ph = player.height - 20;
                return px < this.x + this.width - 10 && px + pw > this.x + 10 &&
                       ppy < gy - 50 + this.height - 10 && ppy + ph > gy - 50 + 15;
            }
        }

        class Block {
            constructor(x, y, width, height) { this.x = x; this.y = canvas.height - 150 - height; this.width = width; this.height = height; }
            draw(cameraX) {
                const sx = this.x - cameraX;
                if (sx < -200 || sx > canvas.width + 200) return;
                ctx.save();
                ctx.translate(sx, this.y);
                ctx.fillStyle = '#4a4a6a';
                ctx.fillRect(0, 0, this.width, this.height);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.strokeRect(0, 0, this.width, this.height);
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                for (let gx = 0; gx < this.width; gx += 25) {
                    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, this.height); ctx.stroke();
                }
                ctx.restore();
            }
            checkCollision(player) {
                return player.x < this.x + this.width && player.x + player.width > this.x &&
                       player.y < this.y + this.height && player.y + player.height > this.y;
            }
        }

        class Platform {
            constructor(x, y, toY, moveSpeed = 2) {
                this.x = x; this.y = y; this.toY = toY; this.width = 150; this.height = 25;
                this.moveSpeed = moveSpeed; this.moving = true;
            }
            draw(cameraX) {
                const sx = this.x - cameraX;
                if (sx < -200 || sx > canvas.width + 200) return;
                ctx.fillStyle = '#667eea';
                ctx.fillRect(sx, this.y, this.width, this.height);
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 2;
                ctx.strokeRect(sx, this.y, this.width, this.height);
            }
            update(groundY) {
                const baseY = groundY - this.height;
                if (this.moving) {
                    this.y += this.moveSpeed;
                    if (this.y > baseY + 80 || this.y < baseY - 80) this.moveSpeed *= -1;
                }
            }
            checkCollision(player) {
                return player.x + player.width > this.x && player.x < this.x + this.width &&
                       player.y + player.height >= this.y && player.y + player.height <= this.y + 25 &&
                       player.velocityY >= 0;
            }
        }

        class Orb {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.radius = 30; this.type = type; this.collected = false;
            }
            draw(cameraX) {
                const sx = this.x - cameraX;
                if (sx < -50 || sx > canvas.width + 50 || this.collected) return;
                ctx.save();
                ctx.translate(sx, this.y);
                const colors = { yellow: '#ff0', pink: '#f64', blue: '#09f', green: '#0f8', red: '#f44', black: '#333' };
                const c = colors[this.type] || '#ff0';
                ctx.fillStyle = c;
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                grad.addColorStop(0, '#fff');
                grad.addColorStop(0.5, c);
                grad.addColorStop(1, c);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            checkCollision(player) {
                if (this.collected) return false;
                const dx = (player.x + player.width / 2) - this.x;
                const dy = (player.y + player.height / 2) - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius + 50;
            }
            activate(player) {
                if (this.collected) return;
                this.collected = true;
                audio.playOrb();
                switch (this.type) {
                    case 'yellow': player.velocityY = player.jumpForce; break;
                    case 'pink': player.velocityY = player.jumpForce * 0.7; break;
                    case 'blue': player.flipped = !player.flipped; player.velocityY = player.jumpForce * (player.flipped ? 1 : -1); break;
                    case 'green': player.velocityY = player.jumpForce * 1.3; break;
                    case 'red': player.velocityY = player.jumpForce * 1.8; player.flipped = false; break;
                }
            }
        }

        const levels = [
            {
                name: "Stereo Madness", difficulty: 1, bgColor1: '#1a0033', bgColor2: '#0d001a', groundColor: '#2d1b4e',
                generate: function() {
                    const e = { spikes: [], blocks: [], platforms: [], orbs: [] };
                    const gy = canvas.height - 150;
                    let x = 900;
                    e.spikes.push(new Spike(x)); x += 350;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'yellow')); x += 350;
                    e.spikes.push(new Spike(x)); x += 350;
                    e.spikes.push(new Spike(x)); x += 350;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'green')); x += 350;
                    for (let i = 0; i < 2; i++) { e.spikes.push(new Spike(x)); x += 280; } x += 200;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'yellow')); x += 350;
                    return e;
                }
            },
            {
                name: "Back On Track", difficulty: 2, bgColor1: '#0a1628', bgColor2: '#061018', groundColor: '#1a3a5c',
                generate: function() {
                    const e = { spikes: [], blocks: [], platforms: [], orbs: [] };
                    const gy = canvas.height - 150;
                    let x = 900;
                    for (let i = 0; i < 2; i++) { e.spikes.push(new Spike(x)); x += 280; }
                    e.orbs.push(new Orb(x + 120, gy - 80, 'yellow')); x += 320;
                    e.blocks.push(new Block(x, gy - 80, 80, 80)); x += 280;
                    e.orbs.push(new Orb(x, gy - 80, 'blue')); x += 250;
                    e.spikes.push(new Spike(x)); x += 300;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'pink')); x += 320;
                    e.spikes.push(new Spike(x)); x += 300;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'green')); x += 320;
                    e.spikes.push(new Spike(x)); x += 300;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'yellow')); x += 320;
                    e.spikes.push(new Spike(x)); x += 280;
                    return e;
                }
            },
            {
                name: "Polargeist", difficulty: 3, bgColor1: '#1a0a28', bgColor2: '#0d0518', groundColor: '#3d1a5c',
                generate: function() {
                    const e = { spikes: [], blocks: [], platforms: [], orbs: [] };
                    const gy = canvas.height - 150;
                    let x = 900;
                    e.blocks.push(new Block(x, gy - 100, 80, 100)); x += 300;
                    e.orbs.push(new Orb(x, gy - 80, 'red')); x += 250;
                    e.spikes.push(new Spike(x)); x += 300;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'blue')); x += 320;
                    e.spikes.push(new Spike(x)); x += 300;
                    e.spikes.push(new Spike(x, 50)); x += 250;
                    e.orbs.push(new Orb(x, 120, 'black')); x += 250;
                    e.spikes.push(new Spike(x)); x += 300;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'yellow')); x += 320;
                    e.blocks.push(new Block(x, gy - 120, 80, 120)); x += 300;
                    e.orbs.push(new Orb(x, gy - 80, 'green')); x += 250;
                    return e;
                }
            },
            {
                name: "Momentum", difficulty: 4, bgColor1: '#0a2818', bgColor2: '#05180d', groundColor: '#1a5c3d',
                generate: function() {
                    const e = { spikes: [], blocks: [], platforms: [], orbs: [] };
                    const gy = canvas.height - 150;
                    let x = 900;
                    e.spikes.push(new Spike(x)); x += 250;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'yellow')); x += 300;
                    e.platforms.push(new Platform(x, gy - 200, gy - 200)); x += 300;
                    e.orbs.push(new Orb(x, gy - 250, 'green')); x += 250;
                    e.spikes.push(new Spike(x)); x += 280;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'pink')); x += 300;
                    e.spikes.push(new Spike(x)); x += 280;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'blue')); x += 300;
                    e.platforms.push(new Platform(x, gy - 180, gy - 180)); x += 300;
                    e.orbs.push(new Orb(x, gy - 230, 'red')); x += 250;
                    return e;
                }
            },
            {
                name: "Time Machine", difficulty: 5, bgColor1: '#280a1a', bgColor2: '#180505', groundColor: '#5c1a3d',
                generate: function() {
                    const e = { spikes: [], blocks: [], platforms: [], orbs: [] };
                    const gy = canvas.height - 150;
                    let x = 900;
                    e.spikes.push(new Spike(x)); x += 220;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'yellow')); x += 280;
                    e.blocks.push(new Block(x, gy - 80, 80, 80)); x += 250;
                    e.orbs.push(new Orb(x, gy - 80, 'blue')); x += 220;
                    e.spikes.push(new Spike(x)); x += 250;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'red')); x += 280;
                    e.spikes.push(new Spike(x, 50)); x += 220;
                    e.orbs.push(new Orb(x, 120, 'black')); x += 220;
                    for (let i = 0; i < 3; i++) { e.spikes.push(new Spike(x)); x += 200; } x += 200;
                    e.orbs.push(new Orb(x + 100, gy - 80, 'green')); x += 280;
                    return e;
                }
            },
            {
                name: "Final Destination", difficulty: 6, bgColor1: '#0a0a1a', bgColor2: '#050505', groundColor: '#1a1a3c',
                generate: function() {
                    const e = { spikes: [], blocks: [], platforms: [], orbs: [] };
                    const gy = canvas.height - 150;
                    let x = 900;
                    e.platforms.push(new Platform(x, gy - 150, gy - 150)); x += 250;
                    e.orbs.push(new Orb(x, gy - 200, 'yellow')); x += 250;
                    e.spikes.push(new Spike(x)); x += 220;
                    e.orbs.push(new Orb(x + 120, gy - 80, 'pink')); x += 280;
                    for (let i = 0; i < 2; i++) { e.spikes.push(new Spike(x)); x += 200; } x += 150;
                    e.blocks.push(new Block(x, gy - 100, 80, 100)); x += 250;
                    e.orbs.push(new Orb(x, gy - 80, 'green')); x += 250;
                    e.platforms.push(new Platform(x, gy - 180, gy - 100)); x += 280;
                    e.orbs.push(new Orb(x + 50, gy - 200, 'red')); x += 250;
                    e.spikes.push(new Spike(x)); x += 220;
                    e.orbs.push(new Orb(x + 100, gy - 80, 'yellow')); x += 280;
                    e.spikes.push(new Spike(x)); x += 220;
                    return e;
                }
            }
        ];

        let groundY, ceilingY;
        const inputState = { holding: false };
        const player = new Player();
        let elements = { spikes: [], blocks: [], platforms: [], orbs: [] };
        let levelLength = 8000;
        game = { camera: { x: 0 } };
        const baseSpeed = 7;

        document.addEventListener('keydown', (e) => {
            if (['Space', 'ArrowUp', 'KeyW'].includes(e.code)) {
                e.preventDefault();
                if (!inputState.holding && gameState.isPlaying && !gameState.isPaused) player.jump();
                inputState.holding = true;
            }
            if (e.code === 'Escape' && gameState.isPlaying) togglePause();
            if (e.code === 'KeyR' && gameState.isPlaying) restartLevel();
        });
        document.addEventListener('keyup', (e) => { if (['Space', 'ArrowUp', 'KeyW'].includes(e.code)) inputState.holding = false; });
        canvas.addEventListener('mousedown', () => { if (gameState.isPlaying && !gameState.isPaused) player.jump(); inputState.holding = true; });
        canvas.addEventListener('mouseup', () => { inputState.holding = false; });

        function showMenu() {
            gameState.isPlaying = false;
            gameState.currentScreen = 'menu';
            ['menu', 'levelSelect', 'pauseMenu', 'deathScreen', 'winScreen'].forEach(id => { document.getElementById(id).style.display = 'none'; });
            document.getElementById('menu').style.display = 'block';
        }

        function showLevelSelect() {
            gameState.currentScreen = 'levelSelect';
            document.getElementById('menu').style.display = 'none';
            document.getElementById('levelSelect').style.display = 'block';
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';
            levels.forEach((l, i) => {
                const btn = document.createElement('div');
                btn.className = 'levelBtn';
                btn.innerHTML = '<div class="levelNum">' + (i + 1) + '</div><div class="levelName">' + l.name + '</div><div class="difficulty">' + Array(5).fill(0).map((_, j) => '<span class="' + (j < l.difficulty ? 'active' : '') + '"></span>').join('') + '</div>';
                btn.onclick = () => startLevel(i);
                grid.appendChild(btn);
            });
            audio.playClick();
        }

        function startLevel(idx) {
            hideAll();
            gameState.currentLevel = idx;
            gameState.attempt = 1;
            gameState.isPlaying = true;
            audio.init();
            audio.startMusic();
            player.y = canvas.height - 200;
            player.reset();
            elements = levels[idx].generate();
            levelLength = 8000;
            game.camera.x = 0;
            document.getElementById('attemptCounter').textContent = 'Attempt 1';
        }

        function restartLevel() {
            hideAll();
            gameState.attempt++;
            document.getElementById('attemptCounter').textContent = 'Attempt ' + gameState.attempt;
            player.y = canvas.height - 200;
            player.reset();
            elements = levels[gameState.currentLevel].generate();
            game.camera.x = 0;
            gameState.isPlaying = true;
            gameState.isPaused = false;
        }

        function hideAll() { ['menu', 'levelSelect', 'pauseMenu', 'deathScreen', 'winScreen'].forEach(id => { document.getElementById(id).style.display = 'none'; }); }

        function togglePause() {
            if (!gameState.isPlaying) return;
            gameState.isPaused = !gameState.isPaused;
            document.getElementById('pauseMenu').style.display = gameState.isPaused ? 'flex' : 'none';
        }

        function resumeGame() { gameState.isPaused = false; document.getElementById('pauseMenu').style.display = 'none'; }

        function showDeathScreen() {
            const pct = Math.floor((player.x / levelLength) * 100);
            document.getElementById('deathPercent').textContent = 'Progress: ' + pct + '%';
            document.getElementById('deathScreen').style.display = 'flex';
        }

        function showWinScreen() {
            gameState.stats = { completed: (gameState.stats.completed || 0) + 1 };
            audio.playWin();
            document.getElementById('winStats').textContent = 'Attempts: ' + gameState.attempt + ' | Jumps: ' + gameState.stats.totalJumps;
            document.getElementById('winScreen').style.display = 'flex';
        }

        function nextLevel() { startLevel((gameState.currentLevel + 1) % levels.length); }

        function exitToMenu() { showMenu(); }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            groundY = canvas.height - 150;
            ceilingY = 50;
            
            if (gameState.isPlaying && !gameState.isPaused) {
                player.x += baseSpeed;
                game.camera.x = player.x - 150;
                player.update(groundY, ceilingY);
                
                elements.platforms.forEach(p => p.update(groundY));
                elements.platforms.forEach(p => {
                    if (p.checkCollision(player)) {
                        player.y = p.y - player.height;
                        player.velocityY = 0;
                        player.grounded = true;
                    }
                });
                
                elements.orbs.forEach(o => { if (o.checkCollision(player) && inputState.holding) o.activate(player); });
                elements.spikes.forEach(s => { if (s.checkCollision(player)) player.die(); });
                elements.blocks.forEach(b => { if (b.checkCollision(player)) player.die(); });
                
                document.getElementById('progressFill').style.width = Math.min(100, Math.floor(player.x / levelLength * 100)) + '%';
                document.getElementById('percentDisplay').textContent = Math.floor(player.x / levelLength * 100) + '%';
                
                if (player.y > canvas.height + 100 || player.y < -100) player.die();
                if (player.x >= levelLength - 100) showWinScreen();
            }
            
            const lvl = levels[gameState.currentLevel] || levels[0];
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, lvl.bgColor1);
            grad.addColorStop(1, lvl.bgColor2);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = lvl.groundColor;
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.stroke();
            
            elements.orbs.forEach(o => o.draw(game.camera.x));
            elements.platforms.forEach(p => p.draw(game.camera.x));
            elements.orbs.forEach(o => o.draw(game.camera.x));
            elements.platforms.forEach(p => p.draw(game.camera.x));
            elements.spikes.forEach(s => s.draw(game.camera.x));
            elements.blocks.forEach(b => b.draw(game.camera.x));
            player.draw();
            
            requestAnimationFrame(gameLoop);
        }

        showMenu();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
