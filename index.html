<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>GD REPLICA - REAL LEVELS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');
        body { margin: 0; overflow: hidden; background: #00274c; font-family: 'Oswald', sans-serif; user-select: none; }
        
        /* Interfața Principală */
        .overlay { 
            position: absolute; inset: 0; display: none; 
            justify-content: center; align-items: center; 
            flex-direction: column; background: rgba(0,0,0,0.5); z-index: 100; 
        }
        .active { display: flex; }

        .btn-play {
            background: #2af598; border: 5px solid #fff; border-radius: 15px;
            padding: 20px 60px; font-size: 40px; cursor: pointer;
            box-shadow: 0 8px 0 #16a34a; transition: 0.1s; color: black;
        }
        .btn-play:active { transform: translateY(8px); box-shadow: none; }

        #game-info {
            position: absolute; top: 20px; width: 100%; display: none;
            justify-content: center; font-size: 24px; color: white; z-index: 10;
        }
        canvas { display: block; background: linear-gradient(180deg, #0052cc 0%, #000 100%); }
    </style>
</head>
<body>

<div id="game-info">PROGRESS: <span id="percent">0</span>%</div>

<div id="ui-lobby" class="overlay active">
    <h1 style="font-size: 80px; text-shadow: 5px 5px #000; margin-bottom: 40px;">GEOMETRY DASH</h1>
    <button class="btn-play" onclick="initGame()">▶ PLAY</button>
    <p style="margin-top: 20px;">STEREO MADNESS - REAL MAP</p>
</div>

<div id="ui-pause" class="overlay">
    <h1 style="font-size: 60px;">PAUSED</h1>
    <button class="btn-play" onclick="resumeGame()">RESUME</button>
    <button class="btn-play" style="background:#ff4444;" onclick="location.reload()">EXIT</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let isPlaying = false;
    let isPaused = false;
    let camX = 0;
    let groundY;

    // HARTA REALA (Stereo Madness primele secunde)
    // format: [x, tip, inaltime] -> tip 0=spike, 1=bloc
    const levelMap = [
        [600, 0], [900, 0], [1200, 1], [1240, 1], [1280, 1], // Primele blocuri
        [1600, 0], [1650, 0], // Double Spike
        [2000, 1, 40], [2040, 1, 40], [2080, 1, 40], // Blocuri la inaltime
        [2500, 0], [2550, 0], [2600, 0], // TRIPLE SPIKE (aia grea)
        [3000, 1], [3040, 1], [3200, 1, 80], [3240, 1, 80]
    ];

    const player = {
        x: 200, y: 0, size: 40,
        dy: 0, grav: 0.98, jump: -16,
        rot: 0,
        update() {
            this.dy += this.grav;
            this.y += this.dy;
            if (this.y > groundY - this.size) {
                this.y = groundY - this.size;
                this.dy = 0;
                this.rot = Math.round(this.rot / 90) * 90;
            } else {
                this.rot += 7;
            }
        }
    };

    function initGame() {
        isPlaying = true;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        groundY = canvas.height - 150;
        player.y = groundY - 40;
        camX = 0;
        
        document.getElementById('ui-lobby').classList.remove('active');
        document.getElementById('game-info').style.display = 'flex';
        
        requestAnimationFrame(gameLoop);
    }

    function gameLoop() {
        if (!isPlaying || isPaused) return;

        // Background & Ground
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#001a33";
        ctx.fillRect(0, groundY, canvas.width, 150);
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        for(let i=0; i<canvas.width; i+=60) {
            ctx.strokeRect(i - (camX % 60), groundY, 60, 60);
        }

        camX += 9;
        player.update();

        // Obstacole
        levelMap.forEach(obs => {
            let ox = obs[0] - camX + player.x;
            let oy = groundY - (obs[2] || 0);

            if (ox < -100 || ox > canvas.width) return;

            if (obs[1] === 0) { // SPIKE
                ctx.fillStyle = "#ff4d4d";
                ctx.beginPath();
                ctx.moveTo(ox, groundY); ctx.lineTo(ox+20, groundY-40); ctx.lineTo(ox+40, groundY);
                ctx.fill();
                // Coliziune Spike
                if (player.x + 30 > ox && player.x + 10 < ox + 30 && player.y + 35 > groundY - 35) die();
            } else { // BLOC
                ctx.fillStyle = "#111";
                ctx.fillRect(ox, oy - 40, 40, 40);
                ctx.strokeStyle = "#fff"; ctx.strokeRect(ox, oy-40, 40, 40);
                // Coliziune Bloc (Aterizare)
                if (player.x + 38 > ox && player.x < ox + 38) {
                    if (player.y + 40 > oy - 40 && player.y + 40 < oy - 20 && player.dy >= 0) {
                        player.y = oy - 80; player.dy = 0;
                    } else if (player.y + 35 > oy - 40) die();
                }
            }
        });

        // Player
        ctx.save();
        ctx.translate(player.x + 20, player.y + 20);
        ctx.rotate(player.rot * Math.PI / 180);
        ctx.fillStyle = "#facc15"; ctx.fillRect(-20, -20, 40, 40);
        ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.strokeRect(-20, -20, 40, 40);
        ctx.restore();

        document.getElementById('percent').innerText = Math.floor(camX / 40);
        requestAnimationFrame(gameLoop);
    }

    function die() {
        isPlaying = false;
        setTimeout(initGame, 500); // Auto-respawn rapid
    }

    function resumeGame() {
        isPaused = false;
        document.getElementById('ui-pause').classList.remove('active');
        gameLoop();
    }

    // CONTROLS
    window.addEventListener('keydown', (e) => {
        if ((e.code === 'Space' || e.code === 'ArrowUp') && player.dy === 0) player.dy = player.jump;
        if (e.key === 'Escape' && isPlaying) {
            isPaused = !isPaused;
            document.getElementById('ui-pause').classList.toggle('active', isPaused);
            if (!isPaused) gameLoop();
        }
    });
    canvas.addEventListener('mousedown', () => { if(player.dy === 0) player.dy = player.jump; });
</script>
</body>
</html>
