<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>GD - UNLIMITED JUMP EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Oswald', sans-serif; touch-action: none; }
        canvas { display: block; }
        #hud { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 50px; color: white; pointer-events: none; text-shadow: 3px 3px #000; z-index: 10; }
        .overlay { position: absolute; inset: 0; display: none; justify-content: center; align-items: center; flex-direction: column; background: rgba(0,0,0,0.8); z-index: 100; color: white; }
        .active { display: flex; }
        .btn { background: #2af598; border: 5px solid #fff; padding: 20px 60px; font-size: 40px; cursor: pointer; border-radius: 15px; color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div id="hud">0%</div>

<div id="ui-start" class="overlay active">
    <h1 style="font-size: 80px;">MEGA LEVEL</h1>
    <button class="btn" onclick="start()">START</button>
</div>

<div id="ui-win" class="overlay">
    <h1 style="font-size: 100px; color: gold;">FINALIZAT!</h1>
    <button class="btn" onclick="location.reload()">JOACĂ IAR</button>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let isRunning = false, camX = 0, groundY;
    let isMouseDown = false; // Monitorizare click apăsat

    const levelEnd = 15000; // Harta foarte lunga
    const map = [];
    for(let i=1; i<100; i++) {
        map.push({x: i * 600 + (Math.random()*300), type: Math.random() > 0.5 ? 0 : 1});
    }

    const player = {
        x: 200, y: 0, size: 60, dy: 0, grav: 1.2, jump: -20, rot: 0,
        update() {
            this.dy += this.grav;
            this.y += this.dy;

            if(this.y >= groundY - this.size) {
                this.y = groundY - this.size;
                this.dy = 0;
                this.rot = Math.round(this.rot / 90) * 90;
                
                // SĂRITURA CONTINUĂ: Dacă mouse-ul e jos, sari imediat ce atingi solul
                if(isMouseDown) {
                    this.dy = this.jump;
                }
            } else {
                this.rot += 10;
            }
        }
    };

    function start() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        groundY = canvas.height - 100;
        player.y = groundY - 60;
        isRunning = true;
        document.getElementById('ui-start').classList.remove('active');
        loop();
    }

    function loop() {
        if(!isRunning) return;

        // Background
        ctx.fillStyle = "#0a0a2a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Ground
        ctx.fillStyle = "#000";
        ctx.fillRect(0, groundY, canvas.width, 100);
        ctx.strokeStyle = "#2af598"; ctx.lineWidth = 5;
        ctx.strokeRect(0, groundY, canvas.width, 2);

        camX += 12;
        player.update();

        // Finish Line
        if(camX > levelEnd) {
            isRunning = false;
            document.getElementById('ui-win').classList.add('active');
            return;
        }

        // Render Obstacole
        map.forEach(obs => {
            let ox = obs.x - camX + player.x;
            if(ox < -100 || ox > canvas.width) return;

            if(obs.type === 0) { // SPIKE
                ctx.fillStyle = "#ff0055";
                ctx.beginPath();
                ctx.moveTo(ox, groundY); ctx.lineTo(ox+35, groundY-70); ctx.lineTo(ox+70, groundY);
                ctx.fill();
                if(player.x+45 > ox && player.x+15 < ox+55 && player.y+55 > groundY-60) die();
            } else { // BLOC
                ctx.fillStyle = "#333";
                ctx.fillRect(ox, groundY-70, 70, 70);
                ctx.strokeStyle = "#fff"; ctx.strokeRect(ox, groundY-70, 70, 70);
                if(player.x+55 > ox && player.x < ox+65 && player.y+55 > groundY-70) die();
            }
        });

        // Player
        ctx.save();
        ctx.translate(player.x+30, player.y+30);
        ctx.rotate(player.rot * Math.PI/180);
        ctx.fillStyle = "#2af598"; ctx.fillRect(-30, -30, 60, 60);
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.strokeRect(-30, -30, 60, 60);
        ctx.restore();

        document.getElementById('hud').innerText = Math.floor((camX/levelEnd)*100) + "%";
        requestAnimationFrame(loop);
    }

    function die() {
        isRunning = false;
        setTimeout(start, 200);
    }

    // LISTENERI PENTRU CLICK APĂSAT (HOLD TO JUMP)
    window.addEventListener('mousedown', () => isMouseDown = true);
    window.addEventListener('mouseup', () => isMouseDown = false);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); isMouseDown = true; }, {passive: false});
    window.addEventListener('touchend', () => isMouseDown = false);

    // KEYBOARD HOLD
    window.addEventListener('keydown', (e) => { if(e.code === 'Space' || e.code === 'ArrowUp') isMouseDown = true; });
    window.addEventListener('keyup', (e) => { if(e.code === 'Space' || e.code === 'ArrowUp') isMouseDown = false; });
</script>
</body>
</html>
